; T-Echo Plus - Default build without IMU (fits in flash)
[env:t-echo-plus]
extends = nrf52840_base
board = t-echo-plus
board_level = pr
board_check = true
debug_tool = jlink
build_type = release

# add -DCFG_SYSVIEW if you want to use the Segger systemview tool for OS profiling.
build_flags = ${nrf52840_base.build_flags}
  -Ivariants/nrf52840/t-echo-plus
  -DTTGO_T_ECHO_PLUS                   ; Define board type (needed by SerialModule)
  -DEINK_DISPLAY_MODEL=GxEPD2_154_D67
  -DEINK_WIDTH=200
  -DEINK_HEIGHT=200
  -DUSE_EINK
  -DUSE_EINK_DYNAMICDISPLAY            ; Enable Dynamic EInk
  -DEINK_LIMIT_FASTREFRESH=20          ; How many consecutive fast-refreshes are permitted
  -DEINK_BACKGROUND_USES_FAST          ; (Optional) Use FAST refresh for both BACKGROUND and RESPONSIVE, until a limit is reached.
  -DUSE_SIMPLE_COMPASS_RENDERER=1      ; Use simple 2D compass to save flash space
  -DCHARGE_TREND_WINDOW_MS=180000      ; 3 min window for charging detection
  -DCHARGE_TREND_UP_DELTA_MV=50        ; Require +50mV rise to detect charging
  -DCHARGE_TREND_DOWN_DELTA_MV=30      ; Require -30mV drop to detect discharging
  -DCHARGE_TREND_STICKY_MS=120000      ; 2 min hysteresis to prevent flip-flopping
  -DRADIOLIB_EXCLUDE_SX128X=1          ; Exclude unused radio chips to save flash
  -DRADIOLIB_EXCLUDE_SX127X=1
  -DRADIOLIB_EXCLUDE_LR11X0=1
  -DRADIOLIB_EXCLUDE_RF69=1
  -DRADIOLIB_EXCLUDE_CC1101=1
  -DRADIOLIB_EXCLUDE_SI443X=1
  -DRADIOLIB_EXCLUDE_NRF24=1
  -Os                                  ; Optimize for size
  -Wl,-Map=$BUILD_DIR/output.map
build_unflags =
  -Ofast
  -Og
  -ggdb3
  -ggdb2
  -g3
  -g2
  -g
  -g1
  -g0


build_src_filter = ${nrf52_base.build_src_filter} +<../variants/nrf52840/t-echo-plus> -<graphics/draw/CompassRenderer.cpp> +<graphics/draw/CompassRendererSimple.cpp>
lib_deps = 
  ${nrf52840_base.lib_deps}
  https://github.com/meshtastic/GxEPD2/archive/55f618961db45a23eff0233546430f1e5a80f63a.zip
  lewisxhe/PCF8563_Library@^1.0.1
  adafruit/Adafruit DRV2605 Library@^1.2.4
  lewisxhe/SensorLib@0.3.3
;upload_protocol = fs

; T-Echo Plus with BHI260AP IMU - Requires feature exclusions to fit in flash
[env:t-echo-plus-imu]
extends = nrf52840_base
board = t-echo-plus
board_level = pr
board_check = true
debug_tool = jlink
build_type = release

build_flags = ${nrf52840_base.build_flags}
  -Ivariants/nrf52840/t-echo-plus
  -DTTGO_T_ECHO_PLUS                   ; Define board type (needed by SerialModule)
  -DEINK_DISPLAY_MODEL=GxEPD2_154_D67
  -DEINK_WIDTH=200
  -DEINK_HEIGHT=200
  -DUSE_EINK
  -DUSE_EINK_DYNAMICDISPLAY            ; Enable Dynamic EInk
  -DEINK_LIMIT_FASTREFRESH=20          ; How many consecutive fast-refreshes are permitted
  -DEINK_BACKGROUND_USES_FAST          ; (Optional) Use FAST refresh for both BACKGROUND and RESPONSIVE, until a limit is reached.
  -DUSE_SIMPLE_COMPASS_RENDERER=1      ; Use simple 2D compass to save flash space
  -DHAS_BHI260AP                       ; BHI260AP IMU sensor
  -DHAS_BHI260AP_SENSORLIB             ; Enable SensorLib for RAM firmware upload (uses built-in firmware)
  -DCHARGE_TREND_WINDOW_MS=180000      ; 3 min window for charging detection
  -DCHARGE_TREND_UP_DELTA_MV=50        ; Require +50mV rise to detect charging
  -DCHARGE_TREND_DOWN_DELTA_MV=30      ; Require -30mV drop to detect discharging
  -DCHARGE_TREND_STICKY_MS=120000      ; 2 min hysteresis to prevent flip-flopping
  -DRADIOLIB_EXCLUDE_SX128X=1          ; Exclude unused radio chips to save flash
  -DRADIOLIB_EXCLUDE_SX127X=1
  -DRADIOLIB_EXCLUDE_LR11X0=1
  -DMESHTASTIC_EXCLUDE_ATAK=1          ; Exclude ATAK support to save space
  -DMESHTASTIC_EXCLUDE_POWER_TELEMETRY=1
  -DMESHTASTIC_EXCLUDE_RANGETEST=1     ; Exclude range test module
  -DMESHTASTIC_EXCLUDE_CANNEDMESSAGES=1
  -DMESHTASTIC_EXCLUDE_OSK=1
  -DMESHTASTIC_EXCLUDE_WAYPOINT=1
  -DMESHTASTIC_EXCLUDE_POWERSTRESS=1
  -DMESHTASTIC_EXCLUDE_NEIGHBORINFO=1          ; Exclude neighbor info module
  -DMESHTASTIC_EXCLUDE_DETECTIONSENSOR=1       ; Exclude detection sensor module
  -DMESHTASTIC_EXCLUDE_STOREFORWARD=1          ; Exclude store & forward module
  -DMESHTASTIC_EXCLUDE_PAXCOUNTER=1            ; Exclude paxcounter module
  -DMESHTASTIC_EXCLUDE_EXTERNALNOTIFICATION=1  ; Exclude external notification
  -DRADIOLIB_EXCLUDE_RF69=1            ; Exclude more unused radio chips
  -DRADIOLIB_EXCLUDE_CC1101=1
  -DRADIOLIB_EXCLUDE_SI443X=1
  -DRADIOLIB_EXCLUDE_NRF24=1
  -Os                                  ; Optimize for size
  -Wl,-Map=$BUILD_DIR/output.map
build_unflags =
  -Ofast
  -Og
  -ggdb3
  -ggdb2
  -g3
  -g2
  -g
  -g1
  -g0


build_src_filter = ${nrf52_base.build_src_filter} +<../variants/nrf52840/t-echo-plus> -<graphics/draw/CompassRenderer.cpp> +<graphics/draw/CompassRendererSimple.cpp> -<modules/OnScreenKeyboardModule.cpp> -<graphics/VirtualKeyboard.cpp> -<modules/CannedMessageModule.cpp>
lib_deps = 
  ${nrf52840_base.lib_deps}
  https://github.com/meshtastic/GxEPD2/archive/55f618961db45a23eff0233546430f1e5a80f63a.zip
  lewisxhe/PCF8563_Library@^1.0.1
  adafruit/Adafruit DRV2605 Library@^1.2.4
  lewisxhe/SensorLib@0.3.3
;upload_protocol = fs

