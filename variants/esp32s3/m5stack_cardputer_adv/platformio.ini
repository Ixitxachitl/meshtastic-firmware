; M5stack Cardputer ADV
[env:m5stack-cardputer-adv]
extends = esp32s3_base
board = m5stack-stamps3
board_check = true
board_build.partitions = default_8MB.csv
upload_protocol = esptool
build_flags = 
  ${esp32_base.build_flags} 
  ;-D PRIVATE_HW
  -D M5STACK_CARDPUTER_ADV
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D GPS_POWER_TOGGLE
  -D USERPREFS_FIRMWARE_EDITION=meshtastic_FirmwareEdition_DIY_EDITION
  ;-D HAS_SDCARD
  ;-D SDCARD_USE_SPI1
  -D WIRE_INTERFACES_COUNT=2                
  -I variants/esp32s3/m5stack_cardputer_adv
  -D HAS_BMI270
  -D BME68X_VARIANT=688
  -D BSEC_CONFIG_PATH=${platformio.libdeps_dir}/${PIOENV}/bsec2/src/config/bme680/bme680_iaq_33v_3s_4d/bsec_iaq.txt
  ; Memory optimizations for constrained heap
  -D MAX_NUM_NODES=100                     ; Keep at 100 for mesh network needs
  -D MINIMUM_SAFE_FREE_HEAP=20000          ; Trigger eviction much earlier (was 1500)
  -D MESSAGE_HISTORY_LIMIT=15              ; Reduce message cache (was 20) saves ~1KB
  -D MESSAGE_TEXT_POOL_SIZE=3300           ; 15 × 220 bytes for message pool
  ; MessageRenderer cache limits - reduce to minimize heap fragmentation from std::string rebuilds
  -D MR_MAX_TOTAL_LINES=128                ; Hard cap on cached lines (default: 512) 
  -D MR_HIGH_WATER_MARK=96                 ; Start shedding early (default: 384)
  -D MR_MAX_LINES_PER_MESSAGE=16           ; Cap per-message wrapping (default: 32)
  -D MR_SHED_BATCH=32                      ; Shed fewer lines at once (default: 64)
  ; BLE Memory Optimizations - reduce from ~59KB to ~35KB
  -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=1        ; Only need 1 phone connection (was 3)
  -D CONFIG_BT_NIMBLE_MAX_BONDS=3              ; Reduce bond storage (was 6)
  -D CONFIG_BT_NIMBLE_MAX_CCCDS=8              ; Reduce client descriptors (was 20)
  -D CONFIG_BT_NIMBLE_ACL_BUF_COUNT=6          ; Reduce ACL buffers (was 12)
  -D CONFIG_BT_NIMBLE_HCI_EVT_HI_BUF_COUNT=15  ; Reduce HCI event buffers (was 30)
  -D CONFIG_BT_NIMBLE_HCI_EVT_LO_BUF_COUNT=4   ; Reduce low priority events (was 8)
  -D CONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=5120 ; Reduce BLE task stack (was 8192)
lib_deps = ${esp32_base.lib_deps}
  adafruit/Adafruit NeoPixel @ ^1.12.0
  https://github.com/meshtastic/st7789/archive/bd33ea58ddfe4a5e4a66d53300ccbd38d66ac21f.zip
  ;lovyan03/LovyanGFX@1.2.7
  earlephilhower/ESP8266Audio@1.9.9
  earlephilhower/ESP8266SAM@1.0.1
  https://github.com/pschatzmann/arduino-audio-driver/archive/refs/tags/v0.1.3.zip
  tinyu-zhao/BMI270_Sensor@^0.0.1
  boschsensortec/BSEC2
  boschsensortec/BME68x Sensor library